<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SeatSwap</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<style>
:root {
  --bg:    var(--tg-theme-bg-color,#17212b);
  --bg2:   var(--tg-theme-secondary-bg-color,#232e3c);
  --text:  var(--tg-theme-text-color,#f5f5f5);
  --hint:  var(--tg-theme-hint-color,#708499);
  --link:  var(--tg-theme-link-color,#5288c1);
  --btn:   var(--tg-theme-button-color,#5288c1);
  --btnT:  var(--tg-theme-button-text-color,#ffffff);
  --danger:#e74c3c; --success:#27ae60; --warn:#f39c12;
  --radius:12px; --radius-sm:8px;
  --nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
#app{padding-bottom:calc(var(--nav-h)+8px)}

/* ── Loader ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.spin{width:40px;height:40px;border:3px solid var(--bg2);border-top-color:var(--btn);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Bottom Nav ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.06);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-size:10px;color:var(--hint);transition:.2s;border:none;background:none;padding:0}
.nav-btn.active{color:var(--btn)}
.nav-btn svg{width:22px;height:22px}

/* ── Cards / Sections ── */
.section{padding:12px}
.card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.divider{height:1px;background:rgba(255,255,255,.06);margin:8px 0}

/* ── Header ── */
.header{padding:16px 16px 8px;display:flex;align-items:center;gap:10px}
.header-icon{width:40px;height:40px;background:var(--btn);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header h2{font-size:18px;font-weight:700}
.header p{font-size:12px;color:var(--hint)}

/* ── Buttons ── */
.btn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:var(--btn);color:var(--btnT)}
.btn-primary:active{opacity:.85}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:8px 14px;width:auto;font-size:12px;border-radius:6px}

/* ── Form ── */
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--hint);margin-bottom:5px;display:block}
.form-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:.2s}
.form-input:focus{border-color:var(--btn)}
.form-input::placeholder{color:var(--hint)}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--btn)}
.stat-label{font-size:11px;color:var(--hint);margin-top:3px}

/* ── Swap Card ── */
.swap-card{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:8px;border-left:3px solid var(--btn)}
.swap-card .name{font-weight:600;font-size:14px}
.swap-card .badge{font-size:11px;color:var(--hint);margin-left:4px}
.swap-card .info{font-size:12px;color:var(--hint);margin:4px 0}
.swap-card .seats{font-size:13px;margin:6px 0}
.swap-card .actions{display:flex;gap:6px;margin-top:8px}

/* ── User Row ── */
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.user-row:last-child{border-bottom:none}
.user-avatar{width:36px;height:36px;background:var(--btn);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-sub{font-size:11px;color:var(--hint)}
.user-actions{display:flex;gap:4px;flex-shrink:0}

/* ── Badge Chips ── */
.chip{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(82,136,193,.2);color:var(--btn)}
.chip.banned{background:rgba(231,76,60,.2);color:var(--danger)}
.chip.admin{background:rgba(39,174,96,.2);color:var(--success)}

/* ── Coach Buttons ── */
.coach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.coach-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:10px;text-align:center;cursor:pointer;transition:.15s;font-size:13px;font-weight:600;color:var(--text)}
.coach-btn:active,.coach-btn.selected{background:var(--btn);color:var(--btnT);border-color:var(--btn)}

/* ── Berth Buttons ── */
.berth-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.berth-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;transition:.15s;font-size:13px;font-weight:600}
.berth-btn:active,.berth-btn.selected{background:var(--btn);color:var(--btnT);border-color:var(--btn)}

/* ── Steps ── */
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:.3s}
.step-dot.active{background:var(--btn);width:20px;border-radius:4px}
.step-dot.done{background:var(--success)}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(20px);background:#1e2d40;color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:.3s;white-space:nowrap;max-width:90vw;text-align:center;border:1px solid rgba(255,255,255,.1)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Profile Badge ── */
.profile-badge{text-align:center;padding:20px 0 10px}
.profile-avatar{width:70px;height:70px;background:var(--btn);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto 10px}
.profile-name{font-size:18px;font-weight:700}
.profile-badge-text{font-size:13px;color:var(--hint);margin-top:4px}
.profile-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.ps-item{text-align:center}
.ps-num{font-size:20px;font-weight:700;color:var(--btn)}
.ps-label{font-size:10px;color:var(--hint)}

/* ── Progress ── */
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--btn);border-radius:3px;transition:.5s}

/* ── Admin Tabs ── */
.tabs{display:flex;background:var(--bg2);border-radius:var(--radius);padding:3px;margin-bottom:12px;gap:2px}
.tab{flex:1;padding:8px;text-align:center;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;color:var(--hint);transition:.2s}
.tab.active{background:var(--btn);color:var(--btnT)}

/* ── Empty State ── */
.empty{text-align:center;padding:30px 20px;color:var(--hint)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:14px}

/* ── Feedback Card ── */
.feedback-card{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.feedback-user{font-weight:600;font-size:13px}
.feedback-msg{color:var(--hint);font-size:13px;margin-top:5px;line-height:1.5}
.feedback-time{font-size:11px;color:var(--hint);margin-top:4px}

/* ── Train Result ── */
.train-result{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.train-result h3{font-size:15px;font-weight:700}
.train-result p{color:var(--hint);font-size:12px;margin-top:2px}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
</style>
</head>

  "3A":{"label":"❄️ AC 3 Tier","max":64,"coaches":Array.from({length:6},(_,i)=>`B${i+1}`)},

const BERTHS_BY_CT = {
  "SL":["Lower","Middle","Upper","Side Lower","Side Upper"],
  "3A":["Lower","Middle","Upper","Side Lower","Side Upper"],
  "2A":["Lower","Upper"], "1A":["Lower","Upper"],
  "CC":["Window","Middle","Aisle"], "GN":["Any"],
};

const BADGES = ["🌱 Newcomer","🎫 Regular (3+)","⭐ Trusted (10+)","🔰 Expert (25+)","👑 Seat Master (50+)"];
const SPECIAL_BADGES = ["👑 Master","⭐ VIP","🛡 Trusted","💎 Premium","👨‍👩‍👧‍👦 Family","🌟 Official","✅ Verified"];

function autoBerth(seat, ct) {
  const s = parseInt(seat);
  if (!s) return "Any";
  if (ct==="SL"||ct==="3A") return ["Lower","Middle","Upper","Lower","Middle","Upper","Side Lower","Side Upper"][(s-1)%8];
  if (ct==="2A") return (s-1)%4<2?"Lower":"Upper";
  if (ct==="1A") return s%2===1?"Lower":"Upper";
  if (ct==="CC") return ["Window","Middle","Aisle"][(s-1)%3];
  return "Any";
}
function getBadge(swaps=0, special="") {
  if (special) return special;
  if (swaps>=50) return "👑 Seat Master";
  if (swaps>=25) return "🔰 Expert Swapper";
  if (swaps>=10) return "⭐ Trusted Member";
  if (swaps>=3)  return "🎫 Regular Traveler";
  return "🌱 Newcomer";
}
function timeAgo(ts) {
  if (!ts) return "";
  try {
    const d = new Date(ts.replace(/(\d+) (\w+) (\d+) (\d+):(\d+) (AM|PM)/,(_,day,mon,yr,h,m,ampm)=>{
      const months={"Jan":0,"Feb":1,"Mar":2,"Apr":3,"May":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Oct":9,"Nov":10,"Dec":11};
      let hour=parseInt(h); if(ampm==="PM"&&hour!==12) hour+=12; if(ampm==="AM"&&hour===12) hour=0;
      return `${yr}-${String(months[mon]+1).padStart(2,'0')}-${String(day).padStart(2,'0')}T${String(hour).padStart(2,'0')}:${m}:00`;
    }));
    const diff = (Date.now()-d.getTime())/60000;
    if (diff<1) return "just now";
    if (diff<60) return `${Math.floor(diff)}m ago`;
    if (diff<1440) return `${Math.floor(diff/60)}h ago`;
    return `${Math.floor(diff/1440)}d ago`;
  } catch(e){ return ts; }
}

// ════════════════════════════════════

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const FB = {
  get: p => db.ref(p).once("value").then(s=>s.val()),
  set: (p,d) => db.ref(p).set(d),

  push: (p,d) => db.ref(p).push(d),
  on: (p,cb) => { db.ref(p).on("value",s=>cb(s.val())); return ()=>db.ref(p).off("value"); },

function isAdmin() { return ADMIN_IDS.includes(App.tgUser?.id); }
function esc(s) { return String(s||"").replace(/[<>&"]/g,c=>({
  "<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"
})[c]); }

// ════════════════════════════════════
//  TOAST
// ════════════════════════════════════
let toastTimer;
function toast(msg, dur=2500) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), dur);
}

// ════════════════════════════════════

function render() {
  document.getElementById("app").innerHTML = `<div class="fade-in">${getView()}</div>`;
  document.getElementById("nav").innerHTML = getNav();
  attachEvents();
}

function getNav() {
  const v = App.view;
  const tabs = [
    {id:"home",   icon:iconHome(),   label:"Home"},
    {id:"find",   icon:iconSearch(), label:"Find"},
    {id:"post",   icon:iconSwap(),   label:"Post"},
    {id:"profile",icon:iconUser(),   label:"Profile"},
  ];
  if (isAdmin()) tabs.push({id:"admin", icon:iconAdmin(), label:"Admin"});
  return tabs.map(t=>`
    <button class="nav-btn ${v===t.id||v.startsWith(t.id)?"active":""}" data-nav="${t.id}">
      ${t.icon}<span>${t.label}</span>
    </button>`).join("");
}

function getView() {
  switch(App.view) {
    case "home":    return viewHome();
    case "find":    return viewFind();
    case "post":    return viewPost();
    case "profile": return viewProfile();
    case "admin":   return viewAdmin();

function viewFind() {

function viewCoachDetail() {
  const items = App.coachView;
  return `
  <div class="header">

  </div>
  <div class="section">
    ${items.map((req,i)=>{
      const u2 = req._user||{}; const badge = getBadge(u2.swaps_done||0, u2.special_badge||"");
      const wseat = req.want_seat&&req.want_seat!="Any"?` (prefers seat <b>${esc(req.want_seat)}</b>)`:"";
      const pnr = req.pnr ? `<br>🎫 PNR: <code>${esc(req.pnr)}</code>` : "";
      return `
      <div class="swap-card">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="name">${esc(req.name)}</span>
          <span class="badge">${badge}</span>
        </div>
        <div class="seats">💺 Seat <b>${esc(req.cur_seat)}</b> (${esc(req.cur_berth)}) → 🔄 <b>${esc(req.want_berth)}</b>${wseat}${pnr}</div>
        <div class="info">✅ ${u2.swaps_done||0} swaps · 🕐 ${timeAgo(req.ts)}</div>
        <div class="actions">
          <a href="tg://user?id=${req.user_id}" class="btn btn-primary btn-sm">📩 Contact</a>
          <button class="btn btn-secondary btn-sm" data-action="report_user" data-uid="${req.user_id}">🚩 Report</button>
        </div>
      </div>`;
    }).join("")}

}

function groupByCoach(items) {
  const map = {};
  items.forEach(r=>{ const c=r.coach||"?"; (map[c]=map[c]||[]).push(r); });
  return Object.entries(map).sort();
}

// ════════════════════════════════════
//  EVENT DELEGATION
// ════════════════════════════════════
let selectedAdminBadge = "";
function attachEvents() {
  document.addEventListener("click", handler, {once:true});
  document.getElementById("nav").addEventListener("click", navHandler);
}
function navHandler(e) {
  const btn = e.target.closest("[data-nav]");
  if (!btn) return;
  App.view = btn.dataset.nav;
  App.coachView = null;
  if (App.view==="post") { App.postStep=1; App.postData={}; }
  if (App.view==="admin") loadAdminData();
  render();
}
function handler(e) {
  const el = e.target.closest("[data-action],[data-nav]");
  if (!el) { document.addEventListener("click",handler,{once:true}); return; }
  if (el.dataset.nav) { navHandler(e); return; }
  const a = el.dataset.action;
  if (a==="do_search") doSearch();
  else if (a==="view_coach") viewCoach(el.dataset.coach);
  else if (a==="back_search") { App.coachView=null; render(); }
  else if (a==="post_next") postNext();
  else if (a==="post_back") { App.postStep=Math.max(1,App.postStep-1); render(); }
  else if (a==="post_submit") postSubmit();
  else if (a==="sel_ct") { App.postData.ct=el.dataset.ct; App.postData.coach=""; render(); }
  else if (a==="sel_coach") { App.postData.coach=el.dataset.c; render(); }
  else if (a==="sel_wberth") { App.postData.wberth=el.dataset.b; render(); }
  else if (a==="admin_tab") { App.adminTab=el.dataset.tab; render(); loadAdminData(); }
  else if (a==="ban_user") banUser(el.dataset.uid, true);
  else if (a==="unban_user") banUser(el.dataset.uid, false);
  else if (a==="badge_user") showBadgeDialog(el.dataset.uid, el.dataset.name);
  else if (a==="admin_del_swap") adminDelSwap(el.dataset.uid);
  else if (a==="cancel_swap") cancelSwap();
  else if (a==="refresh_stats") loadStats();
  else if (a==="report_user") reportUser(el.dataset.uid);
  else if (a==="show_feedback_form") { document.getElementById("feedback-form").style.display="block"; }
  else if (a==="submit_feedback") submitFeedback();
  else if (a==="quick_badge") { selectedAdminBadge=el.dataset.b; document.querySelectorAll("[data-action=quick_badge]").forEach(b=>b.classList.remove("selected")); el.classList.add("selected"); }
  else if (a==="give_badge_admin") giveAdminBadge();
  else if (a==="do_broadcast") saveBroadcast();
  document.addEventListener("click",handler,{once:true});
}

// ════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════
async function doSearch() {
  const inp = document.getElementById("train-search-inp");
  if (!inp) return;
  const train = inp.value.trim().toUpperCase();
  if (!train) { toast("Enter a train number"); return; }
  App.searchTrain = train; App.coachView = null;
  const all = await FB.get("swaps") || {};
  const results = Object.values(all).filter(s=>s.train===train&&s.status==="active");
  for (const r of results) { r._user = await FB.get(`users/${r.user_id}`) || {}; }
  App.searchResults = results;
  render();
}

async function viewCoach(coach) {
  const items = (App.searchResults||[]).filter(r=>r.coach===coach);
  App.coachView = items;
  render();
}

function postNext() {
  const step = App.postStep; const d = App.postData;
  if (step===1) {
    const v = document.getElementById("p-train")?.value?.trim();
    if (!v||!/^\d{4,6}$/.test(v)) { toast("Enter 4–6 digit train number"); return; }
    d.train = v.toUpperCase();
    App.postStep = 2;
  } else if (step===2) {
    if (!d.ct) { toast("Select coach type"); return; }
    if (!d.coach) { toast("Select coach number"); return; }
    App.postStep = 3;
  } else if (step===3) {
    const v = document.getElementById("p-cseat")?.value?.trim();
    const max = COACH_TYPES[d.ct]?.max||72;
    if (!v||!Number.isInteger(+v)||+v<1||+v>max) { toast(`Enter seat 1–${max}`); return; }
    d.cseat = v; d.cberth = autoBerth(v, d.ct);
    App.postStep = 4;
  } else if (step===4) {
    const sv = document.getElementById("p-wseat")?.value?.trim();
    const max = COACH_TYPES[d.ct]?.max||72;
    if (sv && (!Number.isInteger(+sv)||+sv<1||+sv>max)) { toast(`Seat must be 1–${max} or empty`); return; }
    if (!d.wberth) { toast("Select berth type"); return; }
    d.wseat = sv || "Any";
    App.postStep = 5;
  }
  render();
}

async function postSubmit() {
  const d = App.postData;
  const pnrV = document.getElementById("p-pnr")?.value?.trim();
  if (pnrV && !/^\d{10}$/.test(pnrV)) { toast("PNR must be 10 digits or empty"); return; }
  d.pnr = pnrV || "";
  const uid = App.tgUser.id;
  // Delete old swap
  const old = await FB.get("swaps")||{};
  for (const [k,v] of Object.entries(old)) { if(v.user_id===uid) await FB.del(`swaps/${k}`); }
  // Save new
  const sid = Date.now().toString(36);
  await FB.set(`swaps/${sid}`, {
    swap_id: sid, user_id: uid,
    name: App.tgUser.first_name, username: App.tgUser.username||"",
    badge: getBadge(App.dbUser?.swaps_done||0, App.dbUser?.special_badge||""),
    train: d.train, train_name: TRAINS[d.train]||d.train,
    coach_type: d.ct, coach: d.coach,
    cur_seat: d.cseat, cur_berth: d.cberth,
    want_seat: d.wseat, want_berth: d.wberth,
    pnr: d.pnr, status: "active",
    ts: new Date().toLocaleString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:true}).replace(",",""),
  });
  App.mySwap = await getMySwap();
  toast("✅ Request posted successfully!");
  App.view = "home"; App.postStep=1; App.postData={};
  render();
}

async function cancelSwap() {
  const uid = App.tgUser.id;
  const all = await FB.get("swaps")||{};
  for (const [k,v] of Object.entries(all)) { if(v.user_id===uid) await FB.del(`swaps/${k}`); }
  App.mySwap = null;
  toast("✅ Request cancelled");
  render();
}

async function reportUser(uid) {
  const reporter = App.tgUser.id;
  if (reporter==uid) { toast("❌ Can't report yourself"); return; }
  const key = `reports/${reporter}_${uid}`;
  if (await FB.get(key)) { toast("Already reported"); return; }
  await FB.set(key, true);
  const u = await FB.get(`users/${uid}`)||{}; const cnt = (u.reports||0)+1;
  await FB.upd(`users/${uid}`,{reports:cnt});
  if (cnt>=3) { await FB.upd(`users/${uid}`,{banned:true}); toast("⚠️ User reported and banned"); }
  else toast(`Reported (${cnt}/3 before ban)`);
}

async function submitFeedback() {
  const msg = document.getElementById("fb-text")?.value?.trim();
  if (!msg) { toast("Write something first"); return; }
  const uid = App.tgUser.id; const u = App.dbUser||{};
  await FB.set(`feedbacks/${uid}_${Date.now()}`,{
    user_id:uid, name:u.name||"", username:u.username||"",
    message:msg, ts:new Date().toLocaleString(),
  });
  toast("✅ Feedback sent! Thank you.");
  document.getElementById("feedback-form").style.display="none";
  document.getElementById("fb-text").value="";
}

async function banUser(uid, ban) {
  await FB.upd(`users/${uid}`,{banned:ban, reports: ban?3:0});
  toast(ban ? `🚫 User ${uid} banned` : `✅ User ${uid} unbanned`);
  loadAdminData();
}

function showBadgeDialog(uid, name) {
  const badge = prompt(`Give special badge to ${name}:\n\nOptions:\n${SPECIAL_BADGES.join(", ")}\n\nOr enter custom emoji + name:`);
  if (!badge) return;
  FB.upd(`users/${uid}`,{special_badge:badge, badge:badge}).then(()=>{
    toast(`✅ Badge "${badge}" given`); loadAdminData();
  });
}

async function adminDelSwap(uid) {
  const all = await FB.get("swaps")||{};
  for (const [k,v] of Object.entries(all)) { if(v.user_id==uid) await FB.del(`swaps/${k}`); }
  toast("🗑 Swap deleted"); loadAdminData();
}

async function giveAdminBadge() {
  const uid = document.getElementById("badge-uid")?.value?.trim();
  if (!uid) { toast("Enter user ID"); return; }
  if (!selectedAdminBadge) { toast("Select a badge"); return; }
  await FB.upd(`users/${uid}`,{special_badge:selectedAdminBadge, badge:selectedAdminBadge});
  toast(`✅ ${selectedAdminBadge} given to ${uid}`);
}

function saveBroadcast() {
  const msg = document.getElementById("bc-msg")?.value?.trim();
  if (!msg) { toast("Write a message first"); return; }
  FB.set("broadcast/pending",{message:msg, ts:new Date().toLocaleString(), from: App.tgUser.id});
  toast("✅ Message saved! Use /broadcast in bot to send.");
}

// ════════════════════════════════════
//  DATA LOADING
// ════════════════════════════════════
async function getMySwap() {
  const uid = App.tgUser?.id; if (!uid) return null;
  const all = await FB.get("swaps")||{};
  return Object.values(all).find(s=>s.user_id===uid)||null;
}

async function loadStats() {
  const users = await FB.get("users")||{};
  const swaps = await FB.get("swaps")||{};
  const matches = await FB.get("matches")||{};
  const fbs = await FB.get("feedbacks")||{};
  App.stats = {
    users: Object.keys(users).length,
    swaps: Object.values(swaps).filter(s=>s.status==="active").length,
    done:  Object.values(users).reduce((a,u)=>a+(u.swaps_done||0),0),
    feedbacks: Object.keys(fbs).length,
  };
}

async function loadAdminData() {
  await loadStats();
  if (App.adminTab==="users") App.allUsers = await FB.get("users")||{};
  if (App.adminTab==="swaps") App.allSwapsAdmin = await FB.get("swaps")||{};
  if (App.adminTab==="feedbacks") App.feedbacks = await FB.get("feedbacks")||{};
  render();
}

// ════════════════════════════════════
//  INIT
// ════════════════════════════════════
async function init() {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const user = tg?.initDataUnsafe?.user;
  if (!user) {
    // Dev mode — use dummy user
    App.tgUser = {id:0, first_name:"Test", username:"testuser"};
  } else {
    App.tgUser = user;
  }
  const uid = App.tgUser.id;
  // Ensure user exists
  const existing = await FB.get(`users/${uid}`);
  if (!existing) {
    await FB.set(`users/${uid}`,{
      name: App.tgUser.first_name, username: App.tgUser.username||"",
      lang:"en", points:0, swaps_done:0, badge:"🌱 Newcomer",
      banned:false, reports:0, special_user:false, special_badge:"",
      joined: new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
    });
  }
  App.dbUser = await FB.get(`users/${uid}`);
  if (App.dbUser?.banned) {
    document.getElementById("loader").innerHTML = `<div style="text-align:center;padding:20px"><p style="font-size:18px">🚫</p><p style="margin-top:10px;color:var(--danger)">Your account has been suspended.</p></div>`;
    return;
  }
  await loadStats();
  App.mySwap = await getMySwap();
  document.getElementById("loader").style.display="none";
  document.getElementById("app").style.display="block";
  render();
}

init().catch(e=>{
  console.error(e);
  document.getElementById("loader").innerHTML=`<div style="text-align:center;padding:20px;color:var(--danger)"><p>⚠️ Error loading app</p><p style="font-size:12px;margin-top:8px">${e.message}</p></div>`;
});
